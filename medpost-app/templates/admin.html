{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col">
            <h2 class="text-center text-secondary border-bottom border-3 pb-2">Liste des utilisateurs autorisés</h2>
        </div>
    </div>
    <div class="row">
        <div class="col">
            {% for user in users %}
            <form method="POST" action="{{ url_for('update_user', user_id=user.id) }}" class="mb-3">
                <div class="row g-3 align-items-center">
                    <div class="col-12 col-md-4">
                        <label for="username-{{ user.id }}" class="form-label fw-bold">Nom d'utilisateur</label>
                        <input type="text" class="form-control" id="username-{{ user.id }}" name="username" value="{{ user.username }}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label for="password-{{ user.id }}" class="form-label fw-bold">Mot de passe</label>
                        <input type="password" class="form-control" id="password-{{ user.id }}" name="password">
                    </div>
                    <div class="col-12 col-md-2">
                        <label for="is_admin-{{ user.id }}" class="form-label fw-bold">Admin</label>
                        <select class="form-select" id="is_admin-{{ user.id }}" name="is_admin">
                            <option value="true" {% if user.is_admin %}selected{% endif %}>Oui</option>
                            <option value="false" {% if not user.is_admin %}selected{% endif %}>Non</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-2 text-md-start text-center">
                        <button type="submit" class="btn btn-primary mt-3 mt-md-4">Enregistrer</button>
                    </div>
                </div>
            </form>
            {% endfor %}
        </div>
    </div>
    <div class="row mt-4">
        <div class="col text-center">
            <a href="{{ url_for('home', selectedfeed='tous', newspaper='qdm') }}" class="btn btn-secondary">Quitter</a>
        </div>
    </div>
</div>
{% endblock content %}
