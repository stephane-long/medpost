{% extends "layout.html" %}
{% block content %}
<h1 class="text-center">Connexion à Medpost</h1>
<div class="d-flex justify-content-center vh-100 mt-5">
    <form method="POST" action="{{ url_for('login') }}" class="w-50">
        <div class="mb-3 row">
            <label for="username" class="col-form-label col-sm-3 fw-bold">Nom d'utilisateur</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
        </div>
        <div class="mb-3 row">
            <label for="password" class="col-form-label col-sm-3 fw-bold">Mot de passe</label>
            <div class="col-sm-8">
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </div>
    </form>
</div>
{% endblock content %}
